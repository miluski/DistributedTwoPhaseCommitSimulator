server {
    listen 3000 ssl;

    ssl_certificate     /run/secrets/frontend-cert;
    ssl_certificate_key /run/secrets/frontend-key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://coordinator:8443/api/;
        proxy_ssl_verify off;
        proxy_set_header Host coordinator;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /participant-proxy/8444/ {
        proxy_pass https://participant-1:8444/;
        proxy_ssl_verify off;
        proxy_set_header Host participant-1;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /participant-proxy/8445/ {
        proxy_pass https://participant-2:8445/;
        proxy_ssl_verify off;
        proxy_set_header Host participant-2;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /participant-proxy/8446/ {
        proxy_pass https://participant-3:8446/;
        proxy_ssl_verify off;
        proxy_set_header Host participant-3;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /participant-proxy/8447/ {
        proxy_pass https://participant-4:8447/;
        proxy_ssl_verify off;
        proxy_set_header Host participant-4;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /participant-proxy/8448/ {
        proxy_pass https://participant-5:8448/;
        proxy_ssl_verify off;
        proxy_set_header Host participant-5;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /participant-proxy/8449/ {
        proxy_pass https://participant-6:8449/;
        proxy_ssl_verify off;
        proxy_set_header Host participant-6;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass https://coordinator:8443/ws;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host coordinator;
        proxy_set_header Origin $http_origin;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
