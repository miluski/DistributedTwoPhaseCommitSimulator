      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - '3000:3000'
    secrets:
      - frontend-cert
      - frontend-key
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - twopc

secrets:
  coordinator-keystore:
    file: ./secrets/coordinator-keystore.p12
  participant-keystore:
    file: ./secrets/participant-keystore.p12
  trust-store:
    file: ./secrets/trust-store.p12
  frontend-cert:
    file: ./secrets/frontend.crt
  frontend-key:
    file: ./secrets/frontend.key
