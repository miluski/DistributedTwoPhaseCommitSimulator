networks:
  twopc:
    driver: bridge

services:
  coordinator:
    build:
      context: ./backend
      dockerfile: coordinator/Dockerfile
    container_name: coordinator
    ports:
      - '8443:8443'
    environment:
      SERVER_PORT: 8443
      SSL_KEYSTORE_PATH: /run/secrets/coordinator-keystore
      SSL_KEYSTORE_PASSWORD: ${COORDINATOR_KEYSTORE_PASSWORD}
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.trustStore=/run/secrets/trust-store
        -Djavax.net.ssl.trustStorePassword=${COORDINATOR_KEYSTORE_PASSWORD}
        -Djavax.net.ssl.trustStoreType=PKCS12
    secrets:
      - coordinator-keystore
      - trust-store
    networks:
      - twopc
    healthcheck:
      test: ['CMD', 'curl', '-k', '-f', 'https://localhost:8443/actuator/health']
      interval: 10s
      timeout: 5s
      retries: 5

  participant-1:
    build:
      context: ./backend
      dockerfile: participant/Dockerfile
    container_name: participant-1
    ports:
      - '8444:8444'
    environment:
      SERVER_PORT: 8444
      SERVER_ID: server-1
      COORDINATOR_URL: https://coordinator:8443
      PARTICIPANT_HOST: participant-1
      PARTICIPANT_PEERS: https://participant-1:8444,https://participant-2:8445,https://participant-3:8446,https://participant-4:8447,https://participant-5:8448,https://participant-6:8449
      SSL_KEYSTORE_PATH: /run/secrets/participant-keystore
      SSL_KEYSTORE_PASSWORD: ${PARTICIPANT_KEYSTORE_PASSWORD}
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.trustStore=/run/secrets/trust-store
        -Djavax.net.ssl.trustStorePassword=${PARTICIPANT_KEYSTORE_PASSWORD}
        -Djavax.net.ssl.trustStoreType=PKCS12
    secrets:
      - participant-keystore
      - trust-store
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - twopc

  participant-2:
