name: SonarQube analysis

on:
  push:
    branches: ['main']

jobs:
  sonarqube:
    name: Static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build backend and collect coverage data
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress install -Dcheckstyle.skip=true

      - name: Copy runtime dependencies for SonarQube analysis
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress dependency:copy-dependencies -DincludeScope=runtime

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test -- --coverage --run

      - name: Trust SonarQube self-signed certificate
        run: |
          SONAR_HOST=$(echo "${{ secrets.SONAR_HOST_URL }}" | sed 's|https\?://||' | cut -d: -f1)
          SONAR_PORT=$(echo "${{ secrets.SONAR_HOST_URL }}" | sed 's|https\?://||' | grep -o ':[0-9]*' | tr -d ':')
          SONAR_PORT=${SONAR_PORT:-443}
          echo | openssl s_client -showcerts -servername "$SONAR_HOST" -connect "$SONAR_HOST:$SONAR_PORT" 2>/dev/null \
            | openssl x509 -outform PEM > sonarqube-cert.pem
          sudo keytool -import -trustcacerts \
            -keystore "$JAVA_HOME/lib/security/cacerts" \
            -storepass changeit -noprompt \
            -alias sonarqube-server -file sonarqube-cert.pem

      - name: Run SonarQube scanner
        run: npx --yes sonar-scanner -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.token=${{ secrets.SONAR_TOKEN }}
