name: SonarQube analysis

on:
  push:
    branches: ['main']

jobs:
  sonarqube:
    name: Static analysis (self-hosted RPi 5)
    runs-on: [self-hosted, linux, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build backend and collect coverage data
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress install -Dcheckstyle.skip=true

      - name: Copy runtime dependencies for SonarQube analysis
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress dependency:copy-dependencies -DincludeScope=runtime

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test -- --coverage --run

      - name: Run SonarQube scanner
        run: npx --yes sonar-scanner -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.token=${{ secrets.SONAR_TOKEN }}
