name: CI

on:
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['main']

jobs:
  backend:
    name: Backend – build, test, Checkstyle, JaCoCo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and verify
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress verify -Dcheckstyle.skip=true

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: backend/*/target/site/jacoco/
          retention-days: 7

  frontend:
    name: Frontend – typecheck, lint, test, coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test -- --coverage --run

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  docs:
    name: Generate and publish docs
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Generate Javadoc
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress javadoc:aggregate -DskipTests

      - name: Copy Javadoc to docs/backend
        run: |
          mkdir -p docs/backend
          cp -r backend/target/site/apidocs/. docs/backend/

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate TypeDoc
        working-directory: frontend
        run: npm run docs

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "docs: auto-generate Javadoc and TypeDoc [skip ci]"
          git push origin HEAD
